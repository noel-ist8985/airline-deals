name: セール情報の自動更新

on:
  # 定期実行(UTC表記)。JST 7:00 と 19:00 に実行。
  schedule:
    - cron: "0 22 * * *"   # JST 07:00
    - cron: "0 10 * * *"   # JST 19:00
  # 手動実行も可能(Actions画面の "Run workflow" ボタン)
  workflow_dispatch: {}

# data/sales.json をコミットするために書き込み権限を付与
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: セール情報を取得
        run: python3 scripts/fetch_deals.py

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sales.json
          if git diff --staged --quiet; then
            echo "更新なし(変更されたセール情報はありません)"
          else
            git commit -m "chore: セール情報を自動更新"
            git push
          fi
